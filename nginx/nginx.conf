events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker iç DNS: konteyner yeniden başlayınca IP değişir; upstream'i her istekte çöz.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # WebSocket upgrade: Upgrade header varsa "upgrade", yoksa "" (kapalı bağlantı).
    # Böylece /api/ location'ı hem normal istekleri hem WS'i doğru taşır.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Nginx sürüm bilgisini gizle (parmak izini zorlaştırır).
    server_tokens off;

    # GİZLİLİK: Bu bir anonimlik platformu olduğundan istek erişim logları
    # kapatılmıştır. IP adresleri, referer ve user-agent saklanmaz.
    # Hata ayıklama gerekirse aşağıdaki access_log satırını geçici açabilirsiniz.
    access_log off;
    error_log /var/log/nginx/error.log error;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 500M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # BTCPay ayrı kurulunca aktif et:
    # upstream btcpay {
    #     server btcpay:49392;
    # }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name _;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main HTTPS server
    server {
        listen 443 ssl http2;
        server_name localhost;

        # SSL certificates (use Let's Encrypt in production)
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        
        # SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' wss: https:; font-src 'self' data:;" always;

        # Kimlik doğrulama (daha sıkı rate limit - brute force koruması)
        # NOT: Değişkenli proxy_pass'te URI parçası KULLANILMAZ; aksi halde nginx
        # istek yolunu (örn. /api/v1/auth/login) korumaz. URI'siz proxy_pass tam
        # yolu olduğu gibi backend'e iletir.
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;

            set $backend_upstream backend:8000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API + WebSocket (WS yolları /api/v1/.../ws altında olduğundan burada
        # upgrade header'ları gerekir). URI'siz proxy_pass tam yolu korur.
        location /api/ {
            limit_req zone=api burst=40 nodelay;

            set $backend_upstream backend:8000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_read_timeout 3600s;
        }

        # BTCPay Server (btcpay servisi ayağa kalkınca yorumu kaldır)
        # location /btcpay/ {
        #     proxy_pass http://btcpay/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }

        # Static media files
        location /media/ {
            alias /var/www/media/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            
            # Prevent hotlinking (optional)
            valid_referers none blocked server_names;
            if ($invalid_referer) {
                return 403;
            }
        }

        # HLS streaming segments
        location /stream/ {
            alias /var/www/media/streams/;
            expires -1;
            add_header Cache-Control "no-cache";
            
            # CORS for video player
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
        }

        # Frontend (SvelteKit)
        location / {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Favicon / Robots (frontend kökünden; URI'siz proxy_pass tam yolu korur)
        location = /favicon.ico {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host $host;
            expires 30d;
        }

        location = /robots.txt {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host $host;
            expires 1d;
        }

        # Sitemap (backend kökünde /sitemap.xml olarak servis edilir)
        location = /sitemap.xml {
            set $backend_upstream backend:8000;
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
            expires 1h;
        }
    }
}
