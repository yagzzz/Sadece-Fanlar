version: '3.8'

services:
  # ============================================
  # DATABASE & CACHE
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: sf_postgres
    environment:
      POSTGRES_USER: sadecefanlar
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD gerekli}
      POSTGRES_DB: sadecefanlar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Sadece localhost'a bağla - veritabanı internete açılmaz.
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sadecefanlar"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sf_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD gerekli}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD gerekli}
    volumes:
      - redis_data:/data
    # Sadece localhost'a bağla - Redis internete açılmaz.
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # BACKEND API
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sf_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://sadecefanlar:${DB_PASSWORD:?DB_PASSWORD gerekli}@postgres:5432/sadecefanlar
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD gerekli}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY gerekli - openssl rand -hex 32}
      - BTCPAY_URL=${BTCPAY_URL:-http://btcpay:49392}
      - BTCPAY_API_KEY=${BTCPAY_API_KEY}
      - BTCPAY_STORE_ID=${BTCPAY_STORE_ID}
      - BTCPAY_WEBHOOK_SECRET=${BTCPAY_WEBHOOK_SECRET}
      - MONERO_WALLET_RPC_URL=${MONERO_WALLET_RPC_URL:-http://monero-wallet:18083}
      - MONERO_WALLET_RPC_USER=${MONERO_WALLET_RPC_USER:-rpc_user}
      - MONERO_WALLET_RPC_PASSWORD=${MONERO_WALLET_RPC_PASSWORD:?MONERO_WALLET_RPC_PASSWORD gerekli}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY gerekli}
      - MINIO_BUCKET=${MINIO_BUCKET:-sadecefanlar}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
      - media_data:/app/media
    # Sadece localhost'a bağla - dışarıya yalnızca nginx üzerinden erişilir.
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ============================================
  # BACKGROUND WORKERS (Celery)
  # ============================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sf_celery_worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://sadecefanlar:${DB_PASSWORD:?DB_PASSWORD gerekli}@postgres:5432/sadecefanlar
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD gerekli}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY gerekli - openssl rand -hex 32}
      - BTCPAY_URL=${BTCPAY_URL:-http://btcpay:49392}
      - BTCPAY_API_KEY=${BTCPAY_API_KEY}
      - MONERO_WALLET_RPC_URL=${MONERO_WALLET_RPC_URL:-http://monero-wallet:18083}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY gerekli}
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info --concurrency=4

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sf_celery_beat
    environment:
      - DATABASE_URL=postgresql+asyncpg://sadecefanlar:${DB_PASSWORD:?DB_PASSWORD gerekli}@postgres:5432/sadecefanlar
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD gerekli}@redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    command: celery -A app.worker beat --loglevel=info

  # ============================================
  # FRONTEND
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sf_frontend
    environment:
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:8000}
      - PUBLIC_WS_URL=${PUBLIC_WS_URL:-ws://localhost:8000}
      - ORIGIN=${ORIGIN:-http://localhost:3000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # Sadece localhost'a bağla - dışarıya yalnızca nginx üzerinden erişilir.
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ============================================
  # OBJECT STORAGE (S3-compatible)
  # ============================================
  # SEÇENEK A — Yerel MinIO (varsayılan, küçük başlangıç için)
  #   Medya bu VDS üzerinde tutulur. Disk dolunca harici sunucuya geç.
  #
  # SEÇENEK B — Harici S3-uyumlu depolama (nonKYC, ucuz, tavsiye)
  #   Bu servis bloğunu tamamen kaldır (yorum satırı yap veya sil).
  #   .env içinde şunları harici sunucu bilgileriyle doldur:
  #     MINIO_ENDPOINT=depolamaadresi.com        (https gerekmez, sadece host:port)
  #     MINIO_ACCESS_KEY=harici_access_key
  #     MINIO_SECRET_KEY=harici_secret_key
  #     MINIO_PUBLIC_URL=https://depolamaadresi.com
  #     MINIO_USE_SSL=true
  #   Backend doğrudan bu sunucuya bağlanır, buradaki MinIO container'ı gerekmez.
  #
  # S3-uyumlu nonKYC depolama seçenekleri:
  #   https://www.storj.io         (anonim kayıt, Tardigrade/S3)
  #   https://filebase.com         (IPFS tabanlı, S3 API)
  #   https://wasabi.com           (ucuz, S3)
  #   Kendi Hetzner/OVH VPS + MinIO kombinasyonu
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: sf_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY gerekli}
    volumes:
      - minio_data:/data
    # Sadece localhost'a bağla - obje depolama internete açılmaz.
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ============================================
  # BTCPAY SERVER (Bitcoin/Lightning)
  # ============================================
  btcpay:
    image: btcpayserver/btcpayserver:latest
    container_name: sf_btcpay
    environment:
      BTCPAY_POSTGRES: Host=postgres;Database=btcpay;Username=sadecefanlar;Password=${DB_PASSWORD:?DB_PASSWORD gerekli}
      BTCPAY_NETWORK: ${BTCPAY_NETWORK:-mainnet}
      BTCPAY_BIND: 0.0.0.0:49392
      BTCPAY_ROOTPATH: /
      BTCPAY_SSHCONNECTION: ""
      BTCPAY_DEBUGLOG: btcpay.log
    volumes:
      - btcpay_data:/datadir
    # Sadece localhost'a bağla - nginx üzerinden /btcpay/ ile erişilir.
    ports:
      - "127.0.0.1:49392:49392"
    depends_on:
      - postgres
    restart: unless-stopped
    links:
      - postgres

  # ============================================
  # MONERO WALLET RPC (uzak node, yerel senkron yok)
  # monerod burada çalışmaz; herkese açık güvenilir bir node kullanılır.
  # Disk tasarrufu: ~50 GB (pruned blockchain yok)
  # Tercih ettiğin node: MONERO_DAEMON_HOST / MONERO_DAEMON_PORT env ile değiştir.
  # Güvenilir açık node listesi: https://moneroworld.com/#nodes
  # ============================================
  monero-wallet:
    image: sethsimmons/simple-monero-wallet-rpc:latest
    container_name: sf_monero_wallet
    volumes:
      - monero_wallet_data:/home/monero/wallet
    # Cüzdan RPC'si yalnızca localhost - asla internete açılmamalı.
    ports:
      - "127.0.0.1:18083:18083"
    environment:
      WALLET_RPC_USER: ${MONERO_WALLET_RPC_USER:-rpc_user}
      WALLET_RPC_PASS: ${MONERO_WALLET_RPC_PASSWORD:?MONERO_WALLET_RPC_PASSWORD gerekli}
    # Not: entrypoint zaten şunları ekliyor: monero-wallet-rpc --non-interactive
    # --rpc-bind-ip=0.0.0.0 --confirm-external-bind. Burada sadece kalanları veriyoruz.
    command: >
      --rpc-bind-port=18083
      --daemon-address=${MONERO_DAEMON_ADDRESS:-node.monerodevs.org:18089}
      --trusted-daemon
      --rpc-login=${MONERO_WALLET_RPC_USER:-rpc_user}:${MONERO_WALLET_RPC_PASSWORD:?MONERO_WALLET_RPC_PASSWORD gerekli}
      --wallet-dir=/home/monero/wallet
    restart: unless-stopped

  # ============================================
  # NGINX REVERSE PROXY
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: sf_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - media_data:/var/www/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # MEDIA PROCESSING (FFmpeg worker)
  # ============================================
  media_processor:
    build:
      context: ./backend
      dockerfile: Dockerfile.media
    container_name: sf_media_processor
    environment:
      - DATABASE_URL=postgresql+asyncpg://sadecefanlar:${DB_PASSWORD:?DB_PASSWORD gerekli}@postgres:5432/sadecefanlar
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD gerekli}@redis:6379/0
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY gerekli}
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      - redis
      - minio
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info --queues=media --concurrency=2

volumes:
  postgres_data:
  redis_data:
  minio_data:
  btcpay_data:
  monero_wallet_data:   # Sadece cüzdan dosyası (~100 MB), blockchain yok
  media_data:

networks:
  default:
    name: sadecefanlar_network
